<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<style>
  html, body { background: var(--bg); margin: 0; font-family: var(--font-sans); }
  .frame { padding: 18px 20px; display:flex; gap:18px; flex-wrap:wrap; }
  .col { display:flex; flex-direction:column; gap: 8px; }
  .label { font-size: 10.5px; color: var(--ink-3); letter-spacing: 0.06em;
    text-transform: uppercase; font-weight: 600; }
  .badge { display:inline-flex; align-items:center; gap:.2rem;
    padding: .18rem .55rem; border-radius: var(--r-full);
    font-size: 10.5px; font-weight: 500; white-space: nowrap; }
  .badge-green  { background: var(--green-bg);  color: var(--green); }
  .badge-amber  { background: var(--amber-bg);  color: var(--amber); }
  .badge-blue   { background: var(--blue-bg);   color: var(--blue); }
  .badge-red    { background: var(--red-light); color: var(--red); }
  .badge-gray   { background: var(--bg-sunken); color: var(--ink-2); }
  .badge-gold   { background: var(--gold-light);color: var(--gold); }
  .row { display:flex; flex-wrap:wrap; gap: 6px; align-items: center; }
  .fp { display:inline-flex; align-items:center; gap:.25rem;
    padding:.28rem .75rem; border-radius: var(--r-full);
    border:1px solid var(--border); background: var(--bg-card);
    font-size: 11.6px; font-weight: 500; color: var(--ink-2); }
  .fp.active { background: var(--red-light); border-color: var(--red-border); color: var(--red); }
</style>
</head>
<body>
<div class="frame">
  <div class="col" style="flex:1; min-width: 240px">
    <div class="label">Badges — status</div>
    <div class="row">
      <span class="badge badge-green">已上线</span>
      <span class="badge badge-amber">待审核</span>
      <span class="badge badge-gray">草稿</span>
      <span class="badge badge-blue">审核中</span>
      <span class="badge badge-red">学院推荐</span>
      <span class="badge badge-gold">推荐中</span>
    </div>
  </div>
  <div class="col" style="flex:1; min-width: 240px">
    <div class="label">Filter pills</div>
    <div class="row">
      <button class="fp active">全部</button>
      <button class="fp"><i class="ti ti-news"></i>媒体记者</button>
      <button class="fp"><i class="ti ti-speakerphone"></i>公关传播</button>
      <button class="fp"><i class="ti ti-clock"></i>实习</button>
    </div>
  </div>
</div>
</body>
</html>
